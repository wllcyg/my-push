name = "card-worker"
main = "src/index.ts"
compatibility_date = "2024-05-12"
compatibility_flags = [ "nodejs_compat" ]

[triggers]
crons = ["0 23 * * *"] # 每天早上 7:00 触发 (北京时间 UTC+8), 对应 UTC 时间的前一天 23:00

[vars]
QWEN_API_KEY = "your-qwen-api-key"
SUPABASE_URL = "your-supabase-url"
SUPABASE_ANON_KEY = "your-supabase-anon-key"
FRONTEND_URL = "https://card.yourdomain.com"
WECHAT_APP_ID = "your-wechat-app-id"
WECHAT_APP_SECRET = "your-wechat-app-secret"
WECHAT_OPENID = "your-wechat-openid1,your-wechat-openid2"
WECHAT_TEMPLATE_ID = "your-wechat-template-id"

[[kv_namespaces]]
binding = "WORD_HISTORY"
id = "your-kv-namespace-id"
