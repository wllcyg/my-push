<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手测试 - SSE 流式输出</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f5f7fa; }
        .chat-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 400px; display: flex; flex-direction: column; }
        .input-group { display: flex; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #dcdfe6; border-radius: 8px 0 0 8px; outline: none; font-size: 16px; }
        button { padding: 12px 24px; background-color: #409eff; color: white; border: none; border-radius: 0 8px 8px 0; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #66b1ff; }
        button:disabled { background-color: #a0cfff; cursor: not-allowed; }
        #output { flex: 1; white-space: pre-wrap; line-height: 1.6; color: #303133; font-size: 16px; border-top: 1px dashed #ebeef5; padding-top: 20px; }
        .typing { display: inline-block; width: 6px; height: 16px; background: #409eff; animation: blink 1s infinite; vertical-align: middle; margin-left: 4px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h2>🤖 AI 打字机测试 (SSE)</h2>
    
    <div class="chat-container">
        <div class="input-group">
            <input type="text" id="prompt" value="写一首赞美春天的七言绝句" placeholder="输入你想问的问题..." onkeypress="handleEnter(event)">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
        
        <div id="output">等待提问...</div>
    </div>

    <script>
        let eventSource = null;

        function sendMessage() {
            const prompt = document.getElementById('prompt').value;
            const outputBox = document.getElementById('output');
            const btn = document.getElementById('sendBtn');
            
            if (!prompt.trim()) return;

            // 初始化界面
            outputBox.innerHTML = '<span class="typing"></span>';
            btn.disabled = true;
            btn.innerText = "生成中...";

            // 之前如果有可能没关掉的连接，先关掉
            if (eventSource) {
                eventSource.close();
            }

            // 发起 SSE 请求 (自动处理请求和数据流)
            // 注意这里的路径：由于我们挂载在 /static 下，相对根目录的接口就是 /ai/chat/stream
            eventSource = new EventSource(`/ai/chat/stream?prompt=${encodeURIComponent(prompt)}`);

            let fullText = "";

            // 监听数据推送
            eventSource.onmessage = function(event) {
                if (event.data === '[DONE]') {
                    // 大模型说生成完毕了，关闭连接
                    eventSource.close();
                    btn.disabled = false;
                    btn.innerText = "发送";
                    outputBox.innerHTML = fullText; // 移除闪烁光标
                    return;
                }

                try {
                    // 解析后端发来的 JSON
                    const data = JSON.parse(event.data);
                    fullText += data.text;
                    
                    // 实时更新到页面上，并保留一个闪烁的光标
                    outputBox.innerHTML = fullText + '<span class="typing"></span>';
                } catch (e) {
                    console.error("解析 JSON 失败", e);
                }
            };

            // 监听错误
            eventSource.onerror = function(error) {
                console.error("SSE 发生错误", error);
                eventSource.close();
                btn.disabled = false;
                btn.innerText = "发送";
                if (!fullText) {
                    outputBox.innerHTML = "<span style='color:red;'>请求出错或已断开连接，请查看控制台。</span>";
                }
            };
        }

        // 支持回车发送
        function handleEnter(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>

</body>
</html>
